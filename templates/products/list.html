{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- 🖼️ BANNER BOCA -->
<div style="text-align:center; margin-bottom:30px;">
    <img src="{% static 'store/images/Boca2.webp' %}" width="300">
</div>

<h2>Products</h2>

<a href="/products/create/" class="btn">Add Product</a>

{% for product in products %}

<div class="card">

    <!-- 🖼️ PRODUCT IMAGE -->
    {% if product.image %}
        <img src="{{ product.image.url }}" width="200">
    {% else %}
        <div style="width:200px;height:200px;background:#ccc;display:flex;align-items:center;justify-content:center;">
            No Image
        </div>
    {% endif %}

    <!-- 🏷️ PRODUCT NAME -->
    <h3>
        <a href="{% url 'product_detail' product.id %}">
            {{ product.name }}
        </a>
    </h3>

    <!-- 💰 PRICE -->
    <p><strong>${{ product.price }}</strong></p>

    <!-- ⚙️ ACTIONS -->
    <div style="display:flex; gap:10px;">

        <a href="/products/update/{{ product.id }}/" class="btn">
            Edit
        </a>

        <a href="/products/delete/{{ product.id }}/" class="btn btn-danger">
            Delete
        </a>

    </div>

</div>

{% empty %}
<p>No products yet</p>
{% endfor %}

{% endblock %}
