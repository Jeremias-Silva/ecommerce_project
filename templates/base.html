<!DOCTYPE html>
<html>
<head>
    <title>Django E-Commerce</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }

        nav {
            background: #111;
            padding: 15px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .btn-danger {
            background: red;
        }
    </style>
</head>
<body>
E-commerce App
<nav>
    <a href="/">Products</a>
    <a href="/cart/">Cart</a>
    <a href="/login/">Login</a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
