<!DOCTYPE html>
<html>
<head>
    <title>E-commerce</title>

    <style>
        body {
            margin: 0;
            background-color: #0b1a2e;
            color: white;
            font-family: Arial;
        }

        .navbar {
            padding: 15px;
            background: #111;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            color: gold;
            font-weight: bold;
            text-decoration: none;
            font-size: 20px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
        }

        .gold-button {
            background: gold;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .content {
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- NavBar -->
  <div class="navbar">
    <a href="/" class="logo">E-commerce</a>

    <div style="display:flex; gap:15px;">
        <a href="/products/" class="nav-link">Products</a>
        <a href="/login/" class="nav-link">Login</a>
        <a href="/cart/" class="nav-link">Cart</a>
    </div>
</div>

    <!-- Global Button -->
    <div style="padding: 20px;">
        <button class="gold-button">BOCA STORE</button>
    </div>

    <!-- Page content -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
